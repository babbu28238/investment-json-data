name: Supply Macro Repair A426

on:
  workflow_dispatch:
  schedule:
    - cron: '40 9 * * 1-5'

permissions:
  contents: write

jobs:
  supply-macro-repair-a426:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Repair supply and macro scores
        run: python scripts/supply_macro_repair_a426.py
      - name: Commit repaired data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/realtime_recommendations_a405.json data/stock_candidates_ai_scored.json data/supply_macro_repair_summary_a426.json || true
          git commit -m "Supply macro repair A426" || echo "No changes"
          git push
