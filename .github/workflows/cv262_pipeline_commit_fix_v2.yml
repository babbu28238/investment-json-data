name: CV262 Pipeline Commit Fix V2

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  cv262-pipeline-commit-fix-v2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml || true

      - name: Preflight
        run: |
          echo "[CV262 FIX V2] files"
          ls -la
          echo "[CV262 FIX V2] scripts"
          ls -la scripts || true
          test -f stock_candidates.json || (echo "stock_candidates.json not found" && exit 1)
          test -f scripts/update_live_quotes.py || (echo "scripts/update_live_quotes.py not found" && exit 1)
          test -f scripts/validate_live_quotes.py || (echo "scripts/validate_live_quotes.py not found" && exit 1)

      - name: Update live quotes
        id: update_live_quotes
        continue-on-error: true
        run: |
          python scripts/update_live_quotes.py 2>&1 | tee live_quotes_update_log.txt

      - name: Ensure live quotes file exists
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone, timedelta
          kst = timezone(timedelta(hours=9))
          p = Path('live_quotes.json')
          if not p.exists():
              payload = {
                  "version": "CV262_PIPELINE_COMMIT_FIX_V2_EMPTY_FALLBACK",
                  "updatedAt": datetime.now(kst).strftime('%Y-%m-%d %H:%M:%S'),
                  "source": "fallback_empty",
                  "candidateCount": 0,
                  "quoteCount": 0,
                  "okCount": 0,
                  "partialCount": 0,
                  "failCount": 0,
                  "quotes": []
              }
              p.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding='utf-8')
              print('created fallback live_quotes.json')
          else:
              print('live_quotes.json exists')
          PY

      - name: Validate live quotes
        id: validate_live_quotes
        continue-on-error: true
        run: |
          python scripts/validate_live_quotes.py 2>&1 | tee live_quotes_validation_log.txt

      - name: Write app pipeline status
        if: always()
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          from datetime import datetime, timezone, timedelta
          kst = timezone(timedelta(hours=9))
          status = {
              "version": "CV262_PIPELINE_COMMIT_FIX_V2",
              "updatedAt": datetime.now(kst).strftime('%Y-%m-%d %H:%M:%S'),
              "stockCandidatesExists": Path('stock_candidates.json').exists(),
              "liveQuotesExists": Path('live_quotes.json').exists(),
              "validationReportJsonExists": Path('live_quotes_validation_report.json').exists(),
              "validationReportTxtExists": Path('live_quotes_validation_report.txt').exists(),
              "updateLogExists": Path('live_quotes_update_log.txt').exists(),
              "validationLogExists": Path('live_quotes_validation_log.txt').exists(),
              "workflow": "CV262 Pipeline Commit Fix V2",
              "note": "V2 commits diagnostics even when quote collection or validation returns warning/fail."
          }
          Path('app_pipeline_status.json').write_text(json.dumps(status, ensure_ascii=False, indent=2), encoding='utf-8')
          PY

      - name: Commit generated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock_candidates.json || true
          git add app_data_status.json || true
          git add live_quotes.json || true
          git add live_quotes_validation_report.txt || true
          git add live_quotes_validation_report.json || true
          git add live_quotes_update_log.txt || true
          git add live_quotes_validation_log.txt || true
          git add app_pipeline_status.json || true
          echo "[CV262 FIX V2] git status before commit"
          git status --short
          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "CV262 pipeline commit fix v2 update"
            git push
          fi
