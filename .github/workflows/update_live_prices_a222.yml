name: Update Live Prices A222 Real Close Overwrite

on:
  workflow_dispatch:
  schedule:
    # KST 18:35, after Korean market close
    - cron: '35 9 * * 1-5'

permissions:
  contents: write

jobs:
  update-live-prices-a222:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas pykrx

      - name: Overwrite candidate prices with real close
        run: |
          python scripts/overwrite_candidate_real_close_a222.py

      - name: Commit overwritten prices
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/price_update_summary.json data/price_update_detail_a222.json
          git commit -m "Overwrite candidate real close prices A222" || echo "No changes"
          git push
