name: Update Live Prices A221 Force Price Write

on:
  workflow_dispatch:
  schedule:
    - cron: '25 9 * * 1-5'

permissions:
  contents: write

jobs:
  update-live-prices-a221:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas pykrx

      - name: Force update prices in candidate JSON
        run: |
          python scripts/force_update_candidate_prices_a221.py

      - name: Commit updated candidate JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/price_update_summary.json
          git commit -m "Force update candidate prices A221" || echo "No changes"
          git push
