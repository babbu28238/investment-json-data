name: Update Market Candidates V901 FORCE PORTFOLIO QUOTES

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  force-portfolio-live-quotes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Force portfolio holdings into live_quotes.json
        run: |
          set -e
          if [ -f scripts/update_live_quotes_force_portfolio.py ]; then
            python scripts/update_live_quotes_force_portfolio.py
          else
            python update_live_quotes_force_portfolio.py
          fi

      - name: Commit V901 forced portfolio quotes
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add live_quotes.json v901_force_portfolio_quotes_report.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Force portfolio holdings into live quotes"
            git pull --rebase origin main
            git push origin main
          fi
