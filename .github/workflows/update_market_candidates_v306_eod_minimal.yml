name: Update Market Candidates V306 EOD MINIMAL

on:
  workflow_dispatch:
  schedule:
    # KST 17:40 weekdays = UTC 08:40
    - cron: '40 8 * * 1-5'

permissions:
  contents: write

jobs:
  update-market-candidates-v306:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas numpy lxml

      - name: V306 preflight - verify minimal EOD scanner
        run: |
          set -e
          echo "[PREFLIGHT] checking scripts/generate_stock_candidates_v306_minimal.py"
          test -f scripts/generate_stock_candidates_v306_minimal.py
          grep -q "CV306_EOD_MINIMAL_SCANNER" scripts/generate_stock_candidates_v306_minimal.py
          grep -q "EOD_CLOSE_BASED" scripts/generate_stock_candidates_v306_minimal.py

          if grep -q "from pykrx import stock\|get_market_ohlcv_by_date\|CV302\|CV303\|CV304\|CV305_EOD_SAFE" scripts/generate_stock_candidates_v306_minimal.py; then
            echo "[FAIL] Old or slow scanner marker found."
            exit 1
          fi

          echo "[OK] V306 minimal scanner preflight passed"

      - name: V307 preflight - verify app reflect guard
        run: |
          set -e
          echo "[PREFLIGHT] checking scripts/reflect_candidates_v307_app_reflect.py"
          test -f scripts/reflect_candidates_v307_app_reflect.py
          grep -q "V307_APP_REFLECT_GUARD" scripts/reflect_candidates_v307_app_reflect.py
          echo "[OK] V307 reflect script found"

      - name: Generate market candidates input
        timeout-minutes: 8
        run: |
          set -e
          python scripts/generate_stock_candidates_v306_minimal.py

      - name: V306 postflight - validate scanner summary
        run: |
          set -e
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("market_scanner_summary.json")
          if not p.exists():
              raise SystemExit("[FAIL] market_scanner_summary.json not found")

          data = json.loads(p.read_text(encoding="utf-8"))
          print(json.dumps(data, ensure_ascii=False, indent=2))

          if data.get("version") != "CV306_EOD_MINIMAL_SCANNER":
              raise SystemExit(f"[FAIL] expected CV306_EOD_MINIMAL_SCANNER, got {data.get('version')}")

          if data.get("mode") != "EOD_CLOSE_BASED":
              raise SystemExit(f"[FAIL] expected EOD_CLOSE_BASED, got {data.get('mode')}")

          if "fallback" in str(data.get("source", "")).lower():
              raise SystemExit(f"[FAIL] fallback source blocked: {data.get('source')}")

          if int(data.get("universeCount", 0)) < 50:
              raise SystemExit(f"[FAIL] universeCount too small: {data.get('universeCount')}")

          if int(data.get("selectedInputCount", 0)) < 20:
              raise SystemExit(f"[FAIL] selectedInputCount too small: {data.get('selectedInputCount')}")

          print("[OK] V306 summary validation passed")
          PY

      - name: Build stock candidates with mapper
        run: |
          if [ -f scripts/update_stock_candidates_v224_mapper.py ]; then
            python scripts/update_stock_candidates_v224_mapper.py
          elif [ -f scripts/update_stock_candidates.py ]; then
            python scripts/update_stock_candidates.py
          else
            echo "skip mapper"
          fi

      - name: Update live quotes
        run: |
          if [ -f scripts/update_live_quotes.py ]; then
            python scripts/update_live_quotes.py
          else
            echo "skip live quotes"
          fi

      - name: Merge real data if present
        run: |
          if [ -f scripts/merge_real_data_v252.py ]; then
            python scripts/merge_real_data_v252.py
          else
            echo "skip merge"
          fi

      - name: Update recommendation scores
        run: |
          if [ -f scripts/update_recommendation_scores.py ]; then
            python scripts/update_recommendation_scores.py
          else
            echo "skip recommendation scores"
          fi

      - name: Finalize live and recommendation metadata
        run: |
          if [ -f scripts/finalize_live_and_recommendation_metadata.py ]; then
            python scripts/finalize_live_and_recommendation_metadata.py
          else
            echo "skip finalize metadata"
          fi

      - name: Build app data bundle if present
        run: |
          if [ -f scripts/build_app_data_bundle.py ]; then
            python scripts/build_app_data_bundle.py
          else
            echo "skip app data bundle"
          fi

      - name: V307 reflect candidates to app files
        run: |
          set -e
          python scripts/reflect_candidates_v307_app_reflect.py
          test -f v307_app_reflect_report.json

      - name: V307 postflight - block 24 candidate regression
        run: |
          set -e
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          report_path = Path("v307_app_reflect_report.json")
          stock_path = Path("stock_candidates.json")
          bundle_path = Path("app_data_bundle.json")

          if not report_path.exists():
              raise SystemExit("[FAIL] v307_app_reflect_report.json not found")

          if not stock_path.exists():
              raise SystemExit("[FAIL] stock_candidates.json not found")

          if not bundle_path.exists():
              raise SystemExit("[FAIL] app_data_bundle.json not found")

          report = json.loads(report_path.read_text(encoding="utf-8"))
          stock_raw = json.loads(stock_path.read_text(encoding="utf-8"))

          if isinstance(stock_raw, dict):
              stock_count = len(stock_raw.get("candidates", []))
          else:
              stock_count = len(stock_raw)

          bundle_text = bundle_path.read_text(encoding="utf-8", errors="ignore")
          m = re.search(r"candidateCount\s*[:=]\s*(\d+)", bundle_text)
          bundle_count = int(m.group(1)) if m else None

          print(json.dumps(report, ensure_ascii=False, indent=2))
          print(f"[CHECK] stock_candidates count={stock_count}")
          print(f"[CHECK] app_data_bundle candidateCount={bundle_count}")

          if report.get("status") != "ok":
              raise SystemExit(f"[FAIL] V307 report status not ok: {report.get('status')}")

          final_count = int(report.get("finalCandidateCount", 0))
          if final_count < 50:
              raise SystemExit(f"[FAIL] finalCandidateCount too small: {final_count}")

          if stock_count < 50:
              raise SystemExit(f"[FAIL] stock_candidates.json still too small: {stock_count}")

          if bundle_count is not None and bundle_count < 50:
              raise SystemExit(f"[FAIL] app_data_bundle candidateCount still too small: {bundle_count}")

          if "candidateCount: 24" in bundle_text:
              raise SystemExit("[FAIL] app_data_bundle still says candidateCount: 24")

          print("[OK] V307 app reflection passed")
          PY

      - name: Commit updated data files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add \
            stock_candidates_input.csv \
            market_universe.json \
            market_scan_results.json \
            market_scanner_summary.json \
            market_scanner_errors.txt \
            stock_candidates.json \
            live_quotes.json \
            live_quotes_validation_report.json \
            recommendation_meta.json \
            app_data_bundle.json \
            app_operation_status.json \
            pipeline_health.json \
            signal_reflection_audit.json \
            v307_app_reflect_report.json \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update market candidates V306 with V307 app reflection"
            git push
          fi
