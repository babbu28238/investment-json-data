name: Robust Real Data Engine A419

on:
  workflow_dispatch:
  schedule:
    - cron: '10 9 * * 1-5'

permissions:
  contents: write

jobs:
  robust-real-data-engine-a419:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy pykrx
      - name: Run robust real data engine
        run: python scripts/robust_real_data_engine_a419.py
      - name: Commit robust real data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/realtime_recommendations_a405.json data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/data_connection_status_a419.json data/robust_real_data_debug_a419.json
          git commit -m "Robust real data engine A419" || echo "No changes"
          git push
