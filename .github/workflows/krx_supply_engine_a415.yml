name: KRX Supply Engine A415

on:
  workflow_dispatch:
  schedule:
    - cron: '40 8 * * 1-5'

permissions:
  contents: write

jobs:
  krx-supply-engine-a415:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx
      - name: Collect KRX investor supply data
        run: python scripts/krx_supply_engine_a415.py
      - name: Commit KRX supply data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/realtime_recommendations_a405.json data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/krx_supply_a415.json data/krx_supply_debug_a415.json
          git commit -m "KRX supply engine A415" || echo "No changes"
          git push
