name: Final Stable Data Refresh A260

on:
  workflow_dispatch:
  schedule:
    - cron: '10 17 * * 1-5'

permissions:
  contents: write

jobs:
  final-stable-data-refresh-a260:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Final stable data refresh
        run: python scripts/final_stable_data_refresh_a260.py
      - name: Commit final stable data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/final_stable_a260.json
          git commit -m "Final stable data refresh A260" || echo "No changes"
          git push
