name: Update stock candidates

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * 1-5"

permissions:
  contents: write

jobs:
  update-stock-candidates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pykrx pandas numpy

      - name: Generate stock_candidates.json
        run: |
          python scripts/generate_stock_candidates.py

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stock_candidates.json v97_generation_summary.json v97_collection_errors.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update stock_candidates.json"
            git push
          fi
