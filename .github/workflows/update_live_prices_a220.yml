name: Update Live Prices A220 Real Price Pipeline

on:
  workflow_dispatch:
  schedule:
    # KST 18:20, after Korean market close
    - cron: '20 9 * * 1-5'

permissions:
  contents: write

jobs:
  update-live-prices-a220:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas pykrx

      - name: Update current prices in stock candidate JSON
        run: |
          python scripts/update_stock_candidate_prices_a220.py

      - name: Commit updated prices
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/price_update_summary.json
          git commit -m "Update live prices A220" || echo "No changes"
          git push
