name: Stop Guide Card A249

on:
  workflow_dispatch:
  schedule:
    - cron: '05 15 * * 1-5'

permissions:
  contents: write

jobs:
  stop-guide-card-a249:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build stop guide fields
        run: python scripts/build_stop_guide_a249.py
      - name: Commit stop guide fields
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/stop_guide_a249.json
          git commit -m "Build stop guide A249" || echo "No changes"
          git push
