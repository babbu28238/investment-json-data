name: Build Lookup Pool A251

on:
  workflow_dispatch:
  schedule:
    - cron: '35 15 * * 1-5'

permissions:
  contents: write

jobs:
  build-lookup-pool-a251:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build expanded lookup pool
        run: python scripts/build_lookup_pool_a251.py
      - name: Commit expanded lookup pool
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/all_stock_lookup_a251.json data/market_scanner_summary.json
          git commit -m "Build lookup pool A251" || echo "No changes"
          git push
