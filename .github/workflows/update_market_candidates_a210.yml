name: Update Market Candidates A210 Force Real Candidates

on:
  workflow_dispatch:
  schedule:
    - cron: '20 9 * * 1-5'

permissions:
  contents: write

jobs:
  update-market-candidates-a210:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml pykrx
      - name: Generate force real candidates
        run: |
          python scripts/generate_market_candidates_a210.py
      - name: Commit generated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/market_scanner_errors.json data/market_universe.json
          git commit -m "Update force real stock candidates A210" || echo "No changes"
          git push
