name: Update Market Candidates V309 FORCE COMMIT

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market-candidates-v309:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas numpy lxml

      - name: V309 preflight - verify V306 scanner exists
        run: |
          set -e
          test -f scripts/generate_stock_candidates_v306_minimal.py
          grep -q "CV306_EOD_MINIMAL_SCANNER" scripts/generate_stock_candidates_v306_minimal.py
          grep -q "EOD_CLOSE_BASED" scripts/generate_stock_candidates_v306_minimal.py
          echo "[OK] V306 scanner exists"

      - name: Generate market candidates input
        timeout-minutes: 8
        run: |
          set -e
          python scripts/generate_stock_candidates_v306_minimal.py
          test -f stock_candidates_input.csv
          test -f market_scanner_summary.json

      - name: V309 force app files from scanner input
        run: |
          set -e
          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          VERSION = "V309_FORCE_COMMIT_APP_FILES"
          MIN_COUNT = 50

          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST).strftime("%Y-%m-%d %H:%M:%S KST")

          input_csv = Path("stock_candidates_input.csv")
          stock_json = Path("stock_candidates.json")
          bundle_json = Path("app_data_bundle.json")
          report_json = Path("v309_force_commit_report.json")
          legacy_report_json = Path("v307_app_reflect_report.json")

          if not input_csv.exists():
              raise SystemExit("[FAIL] stock_candidates_input.csv not found")

          def clean(v):
              return "" if v is None else str(v).strip()

          def get(row, *keys, default=""):
              lower = {str(k).strip().lower(): v for k, v in row.items()}
              for key in keys:
                  if key.lower() in lower and clean(lower[key]) != "":
                      return clean(lower[key])
              return default

          def to_int(v, default=50):
              try:
                  return int(float(str(v).replace(",", "").replace("%", "").strip()))
              except Exception:
                  return default

          rows = []
          with input_csv.open("r", encoding="utf-8-sig", newline="") as f:
              reader = csv.DictReader(f)
              for raw in reader:
                  code = get(raw, "code", "종목코드", "ticker", "symbol")
                  name = get(raw, "name", "종목명", "stockName")
                  if not code or not name:
                      continue

                  code = str(code).zfill(6)
                  market = get(raw, "market", "시장", default="KOSPI")
                  sector = get(raw, "sector", "industry", "업종", "theme", default="종가선별")
                  score = to_int(get(raw, "score", "totalScore", "점수", default="50"), 50)
                  grade = get(raw, "grade", "등급", default="C")
                  change_rate = get(raw, "changeRate", "change_rate", "등락률", default="-")

                  action = "관찰" if score >= 60 else "보류"

                  item = {
                      "rank": len(rows) + 1,
                      "name": name,
                      "code": code,
                      "market": market,
                      "sector": sector,
                      "industry": sector,
                      "score": score,
                      "grade": grade,
                      "changeRate": change_rate,
                      "reason": f"V309 종가 기준 선별 / 최종 {score}점({grade})",
                      "strategy": "종가 기준 후보: 다음 거래일 시가·눌림·수급 확인 후 분할 접근",
                      "entryPrice": "시가 과열 시 추격 금지, 눌림 확인",
                      "stopLoss": "전일 저점 또는 20일선 이탈",
                      "targetPrice": "분할 익절",
                      "recommendationAction": action,
                      "recommendationGrade": grade,
                      "recommendationScore": score,
                      "recommendationReason": f"V306 EOD 스캐너 기반 V309 강제 반영 후보 / 종가 기준 점수 {score}",
                      "recommendationMeta": {
                          "version": VERSION,
                          "rank": len(rows) + 1,
                          "score": score,
                          "grade": grade,
                          "action": action,
                          "basis": [
                              "v306_eod_scanner",
                              "naver_market_sum",
                              "forced_app_reflect"
                          ],
                          "updatedAt": now
                      },
                      "dataStatus": {
                          "finalRecommendationScore": score,
                          "recommendationAction": action,
                          "technicalScore": to_int(get(raw, "technicalScore", "technical_score", default=str(score)), score),
                          "hasSupplyData": False,
                          "hasReportHint": False,
                          "recommendationUpdatedAt": now,
                          "source": VERSION
                      },
                      "hasRecommendationMeta": True,
                      "updatedAt": now
                  }
                  rows.append(item)

          if len(rows) < MIN_COUNT:
              raise SystemExit(f"[FAIL] candidate count too small: {len(rows)}")

          # stock_candidates.json은 앱이 직접 읽는 파일이므로 배열 구조로 저장
          stock_json.write_text(
              json.dumps(rows, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          # app_data_bundle.json도 JSON 구조로 저장
          bundle = {
              "version": "V309_APP_DATA_BUNDLE",
              "updatedAt": now,
              "status": "ok",
              "candidateCount": len(rows),
              "liveQuoteCount": 0,
              "missingFiles": [],
              "warnings": [],
              "topCandidates": [
                  {
                      "rank": x["rank"],
                      "name": x["name"],
                      "code": x["code"],
                      "score": x["score"],
                      "grade": x["grade"],
                      "reason": x["reason"]
                  }
                  for x in rows[:20]
              ],
              "sources": {
                  "candidates": {
                      "exists": True,
                      "path": "stock_candidates.json",
                      "error": ""
                  },
                  "scannerInput": {
                      "exists": True,
                      "path": "stock_candidates_input.csv",
                      "error": ""
                  },
                  "marketScannerSummary": {
                      "exists": Path("market_scanner_summary.json").exists(),
                      "path": "market_scanner_summary.json",
                      "error": ""
                  }
              },
              "payload": {
                  "candidates": rows
              }
          }

          bundle_json.write_text(
              json.dumps(bundle, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          report = {
              "version": VERSION,
              "status": "ok",
              "updatedAt": now,
              "inputPath": str(input_csv),
              "stockCandidatesPath": str(stock_json),
              "appBundlePath": str(bundle_json),
              "finalCandidateCount": len(rows),
              "appBundleCandidateCount": len(rows),
              "forcedCommit": True
          }

          report_json.write_text(
              json.dumps(report, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          # 기존 확인 루틴과 호환되도록 v307 파일명도 같이 생성
          legacy_report_json.write_text(
              json.dumps(report, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          print("[OK] V309 force app files complete")
          print(f"[OK] finalCandidateCount={len(rows)}")
          print(f"[OK] wrote {stock_json}")
          print(f"[OK] wrote {bundle_json}")
          print(f"[OK] wrote {report_json}")
          print(f"[OK] wrote {legacy_report_json}")
          PY

      - name: V309 postflight - prove files changed and count is valid
        run: |
          set -e
          python - <<'PY'
          import json
          from pathlib import Path

          stock_path = Path("stock_candidates.json")
          bundle_path = Path("app_data_bundle.json")
          report_path = Path("v309_force_commit_report.json")
          legacy_report_path = Path("v307_app_reflect_report.json")

          for p in [stock_path, bundle_path, report_path, legacy_report_path]:
              if not p.exists():
                  raise SystemExit(f"[FAIL] missing file: {p}")

          stock = json.loads(stock_path.read_text(encoding="utf-8"))
          bundle = json.loads(bundle_path.read_text(encoding="utf-8"))
          report = json.loads(report_path.read_text(encoding="utf-8"))

          stock_count = len(stock) if isinstance(stock, list) else len(stock.get("candidates", []))
          bundle_count = int(bundle.get("candidateCount", 0))
          report_count = int(report.get("finalCandidateCount", 0))

          print(f"[CHECK] stock_candidates count={stock_count}")
          print(f"[CHECK] app_data_bundle candidateCount={bundle_count}")
          print(f"[CHECK] report finalCandidateCount={report_count}")

          if stock_count < 50:
              raise SystemExit(f"[FAIL] stock_candidates count too small: {stock_count}")
          if bundle_count < 50:
              raise SystemExit(f"[FAIL] app_data_bundle count too small: {bundle_count}")
          if report_count < 50:
              raise SystemExit(f"[FAIL] report count too small: {report_count}")
          if bundle.get("version") != "V309_APP_DATA_BUNDLE":
              raise SystemExit(f"[FAIL] wrong bundle version: {bundle.get('version')}")

          print("[OK] V309 postflight passed")
          PY

          echo "[GIT STATUS]"
          git status --short

          echo "[GIT DIFF STAT]"
          git diff --stat

      - name: Commit updated data files
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add \
            stock_candidates_input.csv \
            market_universe.json \
            market_scan_results.json \
            market_scanner_summary.json \
            market_scanner_errors.txt \
            stock_candidates.json \
            app_data_bundle.json \
            v309_force_commit_report.json \
            v307_app_reflect_report.json \
            2>/dev/null || true

          echo "[GIT CACHED DIFF]"
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "[FAIL] No changes staged. V309 expected forced updatedAt changes."
            exit 1
          fi

          git commit -m "V309 force commit app candidate files"
          git pull --rebase origin main
          git push origin main

          echo "[OK] pushed V309 app candidate files"
