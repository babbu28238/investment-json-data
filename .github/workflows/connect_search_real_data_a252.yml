name: Connect Search Real Data A252

on:
  workflow_dispatch:
  schedule:
    - cron: '50 15 * * 1-5'

permissions:
  contents: write

jobs:
  connect-search-real-data-a252:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pykrx
      - name: Connect search real data
        run: python scripts/connect_search_real_data_a252.py
      - name: Commit search real data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/search_real_data_a252.json
          git commit -m "Connect search real data A252" || echo "No changes"
          git push
