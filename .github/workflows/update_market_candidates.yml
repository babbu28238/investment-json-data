name: Update Market Candidates V287 Health Monitor

on:
  workflow_dispatch:
  schedule:
    # KST 09:10, 10:00, 11:00, 13:00, 14:00, 15:10 on weekdays
    - cron: '10 0 * * 1-5'
    - cron: '0 1 * * 1-5'
    - cron: '0 2 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '10 6 * * 1-5'

permissions:
  contents: write

jobs:
  update-market-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx requests beautifulsoup4 lxml feedparser

      - name: Generate market candidates
        run: python scripts/generate_stock_candidates.py

      - name: Update news signals
        run: python scripts/update_news_signals.py

      - name: Update supply flow
        run: python scripts/update_supply_flow.py

      - name: Update report signals
        run: python scripts/update_report_signals.py

      - name: Map candidates to app JSON
        run: python scripts/update_stock_candidates_v224_mapper.py

      - name: Merge real data
        run: python scripts/merge_real_data_v252.py

      - name: Update recommendation scores
        run: python scripts/update_recommendation_scores.py

      - name: Update live quotes
        run: python scripts/update_live_quotes.py

      - name: Validate market pipeline
        run: python scripts/validate_market_pipeline.py

      - name: Build pipeline health report
        if: always()
        run: python scripts/build_pipeline_health.py

      - name: Mark intraday pipeline status
        if: always()
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone, timedelta
          kst = timezone(timedelta(hours=9))
          payload = {
            "version": "V287_INTRADAY_AUTO_REFRESH_LOCK",
            "updatedAt": datetime.now(kst).strftime("%Y-%m-%d %H:%M:%S KST"),
            "status": "completed_with_health_report",
            "message": "Market pipeline run finished. Check pipeline_health.json for details."
          }
          open("intraday_pipeline_status.json", "w", encoding="utf-8").write(json.dumps(payload, ensure_ascii=False, indent=2))
          PY

      - name: Commit generated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_candidates_input.csv stock_candidates.json app_data_status.json live_quotes.json report_hints.csv supply_flow_input.csv || true
          git add *_summary.json *_log.txt *_validation.json *_validation.txt || true
          git add news_signals.json supply_flow_summary.json report_signals.json recommendation_summary.json || true
          git add pipeline_health.json pipeline_health.txt intraday_pipeline_status.json || true
          git commit -m "Update market candidates pipeline V287 health monitor" || echo "No changes to commit"
          git push || echo "No changes to push"
