name: Update Market Candidates V279 Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '10 23 * * 0-4'

permissions:
  contents: write

jobs:
  update-market-candidates:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx requests lxml

      - name: Run KRX market universe generator
        run: python scripts/generate_stock_candidates.py

      - name: Run V224 mapper
        run: python scripts/update_stock_candidates_v224_mapper.py

      - name: Run live quote collector
        run: python scripts/update_live_quotes.py
        continue-on-error: true

      - name: Merge optional real data
        run: python scripts/merge_real_data_v252.py
        continue-on-error: true

      - name: Validate live quotes
        run: python scripts/validate_live_quotes.py
        continue-on-error: true

      - name: Commit generated market scanner outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_candidates_input.csv stock_candidates.json app_data_status.json live_quotes.json || true
          git add market_universe.json market_scan_results.json market_scanner_summary.json market_scanner_errors.txt || true
          git add v224_generation_summary.json v224_collection_errors.txt v252_real_data_merge_summary.json v252_real_data_merge_summary.txt || true
          git add live_quotes_validation_report.json live_quotes_validation_report.txt live_quotes_update_log.txt live_quotes_validation_log.txt app_pipeline_status.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "CV279 market scanner update"
            git push
          fi
