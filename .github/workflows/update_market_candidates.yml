name: Update Market Candidates V290 App Bundle Validation Lock

on:
  workflow_dispatch:
  schedule:
    # KST 09:10 / 10:00 / 11:00 / 13:00 / 14:00 / 15:10
    - cron: '10 0 * * 1-5'
    - cron: '0 1 * * 1-5'
    - cron: '0 2 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '10 6 * * 1-5'

permissions:
  contents: write

jobs:
  update-market-candidates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx requests beautifulsoup4 lxml

      - name: Generate market candidates input
        run: python scripts/generate_stock_candidates.py

      - name: Update news signals
        run: python scripts/update_news_signals.py

      - name: Update supply flow
        run: python scripts/update_supply_flow.py

      - name: Update report signals
        run: python scripts/update_report_signals.py

      - name: Build stock candidates JSON
        run: python scripts/update_stock_candidates_v224_mapper.py

      - name: Update live quotes
        run: python scripts/update_live_quotes.py

      - name: Merge real data
        run: python scripts/merge_real_data_v252.py

      - name: Update recommendation scores
        run: python scripts/update_recommendation_scores.py

      - name: Validate market pipeline
        run: python scripts/validate_market_pipeline.py

      - name: Build pipeline health
        run: python scripts/build_pipeline_health.py

      - name: Build app operation status
        run: python scripts/build_app_operation_status.py

      - name: Build app data bundle
        run: python scripts/build_app_data_bundle.py

      - name: Validate app data bundle
        run: python scripts/validate_app_data_bundle.py

      - name: Write intraday pipeline status
        if: always()
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone, timedelta
          kst = timezone(timedelta(hours=9))
          payload = {
              "version": "V290_APP_BUNDLE_VALIDATION_LOCK",
              "updatedAt": datetime.now(kst).strftime("%Y-%m-%d %H:%M:%S"),
              "workflow": "update_market_candidates.yml",
              "status": "completed"
          }
          open("intraday_pipeline_status.json", "w", encoding="utf-8").write(json.dumps(payload, ensure_ascii=False, indent=2))
          PY

      - name: Commit generated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_candidates_input.csv stock_candidates.json live_quotes.json app_data_status.json report_hints.csv supply_flow_input.csv \
                  news_signals.json news_signals_summary.json news_signals_log.txt \
                  supply_flow_summary.json supply_flow_log.txt \
                  report_signals.json report_signals_summary.json report_signals_log.txt \
                  recommendation_summary.json recommendation_log.txt \
                  market_pipeline_validation.json market_pipeline_validation.txt \
                  pipeline_health.json pipeline_health.txt \
                  app_operation_status.json app_operation_status.txt \
                  app_data_bundle.json app_data_bundle.txt \
                  app_data_bundle_validation.json app_data_bundle_validation.txt \
                  intraday_pipeline_status.json || true
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update V290 app data bundle validation lock"
          git push
