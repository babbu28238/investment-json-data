name: Update Market Candidates V278 Scanner

on:
  workflow_dispatch:
  schedule:
    # KST 07:30 on weekdays = UTC 22:30 previous day
    - cron: '30 22 * * 0-4'

permissions:
  contents: write

jobs:
  update-market-candidates:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx requests beautifulsoup4 lxml

      - name: Run KRX market scanner candidate generator
        run: |
          python scripts/generate_stock_candidates.py

      - name: Run live quote collector
        run: |
          if [ -f scripts/update_live_quotes.py ]; then
            python scripts/update_live_quotes.py
          else
            echo "scripts/update_live_quotes.py not found - skip"
          fi

      - name: Merge optional real data
        run: |
          if [ -f scripts/merge_real_data_v252.py ]; then
            python scripts/merge_real_data_v252.py
          else
            echo "scripts/merge_real_data_v252.py not found - skip"
          fi

      - name: Validate live quotes
        run: |
          if [ -f scripts/validate_live_quotes.py ]; then
            python scripts/validate_live_quotes.py
          else
            echo "scripts/validate_live_quotes.py not found - skip"
          fi

      - name: Commit generated market scanner outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_candidates.json app_data_status.json v101_generation_summary.json v101_collection_errors.txt live_quotes.json live_quotes_validation_report.json live_quotes_validation_report.txt app_pipeline_status.json v252_real_data_merge_summary.json v252_real_data_merge_summary.txt || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update market scanner candidates"
            git push
          fi
