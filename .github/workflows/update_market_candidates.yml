name: Update Market Candidates V305 EOD SAFE

on:
  workflow_dispatch:
  schedule:
    # KST 17:30 weekdays = UTC 08:30
    - cron: '30 8 * * 1-5'

permissions:
  contents: write

jobs:
  update-market-candidates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests beautifulsoup4 lxml

      - name: V305 preflight - block old or slow scanner
        run: |
          set -e
          echo "[PREFLIGHT] checking scripts/generate_stock_candidates.py"
          test -f scripts/generate_stock_candidates.py
          grep -q "CV305_EOD_SAFE_SCANNER" scripts/generate_stock_candidates.py
          grep -q "EOD_CLOSE_BASED" scripts/generate_stock_candidates.py

          if grep -q "CV302\|CV303_MARKET_SCANNER\|CV304_MARKET_SCANNER\|V302 no-login\|fallback_static_universe 사용" scripts/generate_stock_candidates.py; then
            echo "[FAIL] Old scanner marker found in scripts/generate_stock_candidates.py"
            exit 1
          fi

          if grep -q "from pykrx import stock" scripts/generate_stock_candidates.py; then
            echo "[FAIL] Slow pykrx scanner import found. V305 must use NAVER EOD safe scanner."
            exit 1
          fi

          echo "[OK] V305 EOD scanner preflight passed"

      - name: Generate market candidates input
        timeout-minutes: 12
        run: |
          set -e
          python scripts/generate_stock_candidates.py

      - name: V305 postflight - validate scanner summary
        run: |
          set -e
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("market_scanner_summary.json")
          if not p.exists():
              raise SystemExit("[FAIL] market_scanner_summary.json not found")

          data = json.loads(p.read_text(encoding="utf-8"))
          print(json.dumps(data, ensure_ascii=False, indent=2))

          if data.get("version") != "CV305_EOD_SAFE_SCANNER":
              raise SystemExit(f"[FAIL] expected CV305_EOD_SAFE_SCANNER, got {data.get('version')}")

          if data.get("mode") != "EOD_CLOSE_BASED":
              raise SystemExit(f"[FAIL] expected EOD_CLOSE_BASED, got {data.get('mode')}")

          if "fallback" in str(data.get("source", "")).lower():
              raise SystemExit(f"[FAIL] fallback source blocked: {data.get('source')}")

          if int(data.get("universeCount", 0)) < 200:
              raise SystemExit(f"[FAIL] universeCount too small: {data.get('universeCount')}")

          if int(data.get("selectedInputCount", 0)) < 30:
              raise SystemExit(f"[FAIL] selectedInputCount too small: {data.get('selectedInputCount')}")

          print("[OK] V305 EOD summary validation passed")
          PY

      - name: Update news signals if present
        run: |
          if [ -f scripts/update_news_signals.py ]; then
            python scripts/update_news_signals.py
          else
            echo "skip news"
          fi

      - name: Update report signals if present
        run: |
          if [ -f scripts/update_report_signals.py ]; then
            python scripts/update_report_signals.py
          else
            echo "skip report"
          fi

      - name: Update supply flow if present
        run: |
          if [ -f scripts/update_supply_flow.py ]; then
            python scripts/update_supply_flow.py
          else
            echo "skip supply"
          fi

      - name: Build stock candidates with mapper
        run: |
          if [ -f scripts/update_stock_candidates_v224_mapper.py ]; then
            python scripts/update_stock_candidates_v224_mapper.py
          elif [ -f scripts/update_stock_candidates.py ]; then
            python scripts/update_stock_candidates.py
          else
            echo "skip mapper"
          fi

      - name: Update live quotes
        run: |
          if [ -f scripts/update_live_quotes.py ]; then
            python scripts/update_live_quotes.py
          else
            echo "skip live quotes"
          fi

      - name: Merge real data if present
        run: |
          if [ -f scripts/merge_real_data_v252.py ]; then
            python scripts/merge_real_data_v252.py
          else
            echo "skip merge"
          fi

      - name: Update recommendation scores
        run: |
          if [ -f scripts/update_recommendation_scores.py ]; then
            python scripts/update_recommendation_scores.py
          else
            echo "skip recommendation scores"
          fi

      - name: Finalize live and recommendation metadata
        run: |
          if [ -f scripts/finalize_live_and_recommendation_metadata.py ]; then
            python scripts/finalize_live_and_recommendation_metadata.py
          else
            echo "skip finalize metadata"
          fi

      - name: Build pipeline health if present
        run: |
          if [ -f scripts/build_pipeline_health.py ]; then
            python scripts/build_pipeline_health.py
          else
            echo "skip pipeline health"
          fi

      - name: Build app operation status if present
        run: |
          if [ -f scripts/build_app_operation_status.py ]; then
            python scripts/build_app_operation_status.py
          else
            echo "skip app operation status"
          fi

      - name: Build app data bundle if present
        run: |
          if [ -f scripts/build_app_data_bundle.py ]; then
            python scripts/build_app_data_bundle.py
          else
            echo "skip app data bundle"
          fi

      - name: Validate app data bundle if present
        run: |
          if [ -f scripts/validate_app_data_bundle.py ]; then
            python scripts/validate_app_data_bundle.py
          else
            echo "skip app data bundle validation"
          fi

      - name: Audit signal reflection if present
        run: |
          if [ -f scripts/audit_signal_reflection.py ]; then
            python scripts/audit_signal_reflection.py
          else
            echo "skip audit signal reflection"
          fi

      - name: Commit updated data files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add \
            stock_candidates_input.csv \
            stock_candidates.json \
            market_universe.json \
            market_scan_results.json \
            market_scanner_summary.json \
            market_scanner_errors.txt \
            live_quotes.json \
            live_quotes_validation_report.json \
            recommendation_meta.json \
            app_data_bundle.json \
            app_operation_status.json \
            pipeline_health.json \
            signal_reflection_audit.json \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update market candidates V305 EOD SAFE"
            git push
          fi
