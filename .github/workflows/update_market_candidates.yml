name: Update Market Candidates V304 FORCE

on:
  workflow_dispatch:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '0 1 * * 1-5'
    - cron: '0 2 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '10 6 * * 1-5'

permissions:
  contents: write

jobs:
  update-market-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests beautifulsoup4 lxml pykrx

      - name: V304 preflight - block old scanner
        run: |
          echo "[CHECK] scanner file header"
          head -30 scripts/generate_stock_candidates.py
          if ! grep -q "CV304" scripts/generate_stock_candidates.py; then
            echo "::error::scripts/generate_stock_candidates.py is NOT V304. Replace this file first. Current workflow stopped to prevent another CV302 fallback run."
            exit 1
          fi

      - name: Generate market candidates input
        run: python scripts/generate_stock_candidates.py

      - name: V304 output validation - block fallback
        run: |
          echo "[CHECK] market_scanner_summary.json"
          cat market_scanner_summary.json
          python - <<'PY'
          import json, sys
          from pathlib import Path
          p = Path('market_scanner_summary.json')
          if not p.exists():
              print('::error::market_scanner_summary.json not found')
              sys.exit(1)
          data = json.loads(p.read_text(encoding='utf-8'))
          version = str(data.get('version',''))
          source = str(data.get('source',''))
          universe = int(data.get('universeCount') or 0)
          selected = int(data.get('selectedInputCount') or 0)
          if 'CV304' not in version:
              print(f'::error::Expected CV304 summary, got version={version}')
              sys.exit(1)
          if 'fallback' in source.lower() or universe <= 24:
              print(f'::error::Universe failed: source={source}, universeCount={universe}')
              sys.exit(1)
          if selected < 50:
              print(f'::error::Too few selectedInputCount={selected}')
              sys.exit(1)
          print(f'[OK] V304 scanner success: version={version}, source={source}, universeCount={universe}, selectedInputCount={selected}')
          PY

      - name: Update news signals
        run: python scripts/update_news_signals.py

      - name: Update report signals
        run: python scripts/update_report_signals.py

      - name: Update supply flow
        run: python scripts/update_supply_flow.py

      - name: Build stock candidates with mapper
        run: python scripts/update_stock_candidates_v224_mapper.py

      - name: Update live quotes
        run: python scripts/update_live_quotes.py

      - name: Merge real data if present
        run: |
          if [ -f scripts/merge_real_data_v252.py ]; then python scripts/merge_real_data_v252.py; fi

      - name: Update recommendation scores
        run: python scripts/update_recommendation_scores.py

      - name: Finalize live and recommendation metadata
        run: python scripts/finalize_live_recommendation_meta.py

      - name: Build pipeline health if present
        run: |
          if [ -f scripts/build_pipeline_health.py ]; then python scripts/build_pipeline_health.py; fi

      - name: Build app operation status if present
        run: |
          if [ -f scripts/build_app_operation_status.py ]; then python scripts/build_app_operation_status.py; fi

      - name: Build app data bundle if present
        run: |
          if [ -f scripts/build_app_data_bundle.py ]; then python scripts/build_app_data_bundle.py; fi

      - name: Validate app data bundle if present
        run: |
          if [ -f scripts/validate_app_data_bundle.py ]; then python scripts/validate_app_data_bundle.py; fi

      - name: Audit signal reflection if present
        run: |
          if [ -f scripts/audit_signal_reflection.py ]; then python scripts/audit_signal_reflection.py; fi

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add             stock_candidates_input.csv             market_universe.json             market_scan_results.json             market_scanner_summary.json             market_scanner_errors.txt             stock_candidates.json             live_quotes.json             news_signals.json news_signals_summary.json news_signals_log.txt             report_signals.json report_signals_summary.json report_signals_log.txt             report_hints.csv             supply_flow_input.csv supply_flow_summary.json supply_flow_log.txt supply_flow_debug.json             recommendation_summary.json recommendation_log.txt             app_data_status.json app_operation_status.json app_operation_status.txt             app_data_bundle.json app_data_bundle.txt app_data_bundle_validation.json app_data_bundle_validation.txt             pipeline_health.json pipeline_health.txt intraday_pipeline_status.json             market_pipeline_validation.json market_pipeline_validation.txt             signal_reflection_audit.json signal_reflection_audit.txt             v299_live_recommendation_meta_fix.json v299_live_recommendation_meta_fix.txt             2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update market candidates V304 force scanner outputs"
            git push
          fi
