name: Update Market Candidates V295 Signal Reflection Fix

on:
  workflow_dispatch:
  schedule:
    # KST 09:10 / 10:00 / 11:00 / 13:00 / 14:00 / 15:10
    - cron: '10 0 * * 1-5'
    - cron: '0 1 * * 1-5'
    - cron: '0 2 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '10 6 * * 1-5'

permissions:
  contents: write

jobs:
  update-market-candidates:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx beautifulsoup4 requests lxml

      - name: Generate market scanner input
        run: |
          python scripts/generate_stock_candidates.py

      - name: Update news signals
        run: |
          if [ -f scripts/update_news_signals.py ]; then python scripts/update_news_signals.py; else echo "skip news"; fi

      - name: Update supply flow
        run: |
          if [ -f scripts/update_supply_flow.py ]; then python scripts/update_supply_flow.py; else echo "skip supply"; fi

      - name: Update report signals
        run: |
          if [ -f scripts/update_report_signals.py ]; then python scripts/update_report_signals.py; else echo "skip report"; fi

      - name: Update DART signals if key exists
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          if [ -f scripts/update_dart_signals.py ]; then python scripts/update_dart_signals.py; else echo "skip dart"; fi

      - name: Build stock candidates json
        run: |
          python scripts/update_stock_candidates_v224_mapper.py

      - name: Update live quotes
        run: |
          python scripts/update_live_quotes.py

      - name: Merge real data
        run: |
          if [ -f scripts/merge_real_data_v252.py ]; then python scripts/merge_real_data_v252.py; else echo "skip merge"; fi

      - name: Update recommendation scores
        run: |
          if [ -f scripts/update_recommendation_scores.py ]; then python scripts/update_recommendation_scores.py; else echo "skip recommendation"; fi

      - name: Finalize signal reflection
        run: |
          python scripts/finalize_stock_candidates.py

      - name: Build pipeline health
        run: |
          if [ -f scripts/build_pipeline_health.py ]; then python scripts/build_pipeline_health.py; else echo "skip health"; fi

      - name: Build app operation status
        run: |
          if [ -f scripts/build_app_operation_status.py ]; then python scripts/build_app_operation_status.py; else echo "skip app operation status"; fi

      - name: Build app data bundle
        run: |
          if [ -f scripts/build_app_data_bundle.py ]; then python scripts/build_app_data_bundle.py; else echo "skip bundle"; fi

      - name: Validate app data bundle
        run: |
          if [ -f scripts/validate_app_data_bundle.py ]; then python scripts/validate_app_data_bundle.py; else echo "skip bundle validation"; fi

      - name: Audit signal reflection
        run: |
          if [ -f scripts/audit_signal_reflection.py ]; then python scripts/audit_signal_reflection.py; else echo "skip audit"; fi

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_candidates_input.csv stock_candidates.json live_quotes.json app_data_status.json report_hints.csv supply_flow_input.csv || true
          git add news_signals.json news_signals_summary.json news_signals_log.txt || true
          git add report_signals.json report_signals_summary.json report_signals_log.txt || true
          git add supply_flow_summary.json supply_flow_log.txt || true
          git add recommendation_summary.json recommendation_log.txt || true
          git add v295_signal_reflection_fix_summary.json v295_signal_reflection_fix.txt || true
          git add market_pipeline_validation.json market_pipeline_validation.txt || true
          git add pipeline_health.json pipeline_health.txt intraday_pipeline_status.json || true
          git add app_operation_status.json app_operation_status.txt app_data_bundle.json app_data_bundle.txt app_data_bundle_validation.json app_data_bundle_validation.txt || true
          git add signal_reflection_audit.json signal_reflection_audit.txt || true
          git commit -m "Update market candidates V295 signal reflection fix" || echo "No changes to commit"
          git push
