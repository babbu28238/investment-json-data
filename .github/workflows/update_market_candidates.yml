name: Update Market Candidates V280 News Engine

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pykrx pandas numpy requests beautifulsoup4 lxml

      - name: Build market universe candidate input
        run: python scripts/generate_stock_candidates.py

      - name: Build news signals
        run: python scripts/update_news_signals.py

      - name: Build stock candidates with supply/news mapper
        run: python scripts/update_stock_candidates_v224_mapper.py

      - name: Run live quote collector
        run: python scripts/update_live_quotes.py

      - name: Merge optional real data
        run: |
          if [ -f scripts/merge_real_data_v252.py ]; then python scripts/merge_real_data_v252.py; fi

      - name: Validate live quotes
        run: |
          if [ -f scripts/validate_live_quotes.py ]; then python scripts/validate_live_quotes.py; fi

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_candidates_input.csv stock_candidates.json app_data_status.json live_quotes.json report_hints.csv news_signals.json news_signals_summary.json news_signals_log.txt v224_generation_summary.json v224_collection_errors.txt v252_real_data_merge_summary.json v252_real_data_merge_summary.txt live_quotes_validation_report.json live_quotes_validation_report.txt live_quotes_validation_log.txt live_quotes_update_log.txt app_pipeline_status.json || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "CV280 update market candidates with news signals"
            git push
          fi
