name: Update Market Candidates V284 Recommendation Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "10 0 * * 1-5"   # KST 09:10
    - cron: "40 2 * * 1-5"   # KST 11:40
    - cron: "10 5 * * 1-5"   # KST 14:10

permissions:
  contents: write

jobs:
  update-market-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx requests beautifulsoup4 lxml

      - name: Run KRX market scanner candidate generator
        run: python scripts/generate_stock_candidates.py

      - name: Run news signal engine
        run: |
          if [ -f scripts/update_news_signals.py ]; then
            python scripts/update_news_signals.py
          else
            echo "scripts/update_news_signals.py not found. Skip news engine."
          fi

      - name: Run report signal engine
        run: |
          if [ -f scripts/update_report_signals.py ]; then
            python scripts/update_report_signals.py
          else
            echo "scripts/update_report_signals.py not found. Skip report engine."
          fi

      - name: Run supply flow engine
        run: |
          if [ -f scripts/update_supply_flow.py ]; then
            python scripts/update_supply_flow.py
          else
            echo "scripts/update_supply_flow.py not found. Skip supply engine."
          fi

      - name: Build app stock_candidates.json via V224 mapper
        run: python scripts/update_stock_candidates_v224_mapper.py

      - name: Merge optional real data
        run: |
          if [ -f scripts/merge_real_data_v252.py ]; then
            python scripts/merge_real_data_v252.py
          else
            echo "scripts/merge_real_data_v252.py not found. Skip merge."
          fi

      - name: Run final recommendation score engine
        run: python scripts/update_recommendation_scores.py

      - name: Run live quote collector
        run: |
          if [ -f scripts/update_live_quotes.py ]; then
            python scripts/update_live_quotes.py
          else
            echo "scripts/update_live_quotes.py not found. Skip live quotes."
          fi

      - name: Validate live quotes
        run: |
          if [ -f scripts/validate_live_quotes.py ]; then
            python scripts/validate_live_quotes.py || true
          else
            echo "scripts/validate_live_quotes.py not found. Skip validation."
          fi

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock_candidates_input.csv stock_candidates.json app_data_status.json || true
          git add live_quotes.json live_quotes_validation_report.json live_quotes_validation_report.txt || true
          git add news_signals.json news_signals_summary.json news_signals_log.txt || true
          git add report_signals.json report_signals_summary.json report_signals_log.txt || true
          git add supply_flow_input.csv supply_flow_summary.json supply_flow_log.txt || true
          git add recommendation_summary.json recommendation_log.txt || true
          git add report_hints.csv v224_generation_summary.json v224_collection_errors.txt || true
          git add v252_real_data_merge_summary.json v252_real_data_merge_summary.txt || true
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "V284 update final recommendation scores"
          git push
