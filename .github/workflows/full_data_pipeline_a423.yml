name: Full Data Pipeline A423

on:
  workflow_dispatch:
  schedule:
    - cron: '20 9 * * 1-5'

permissions:
  contents: write

jobs:
  full-data-pipeline-a423:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy pykrx

      - name: Run macro environment
        run: |
          if [ -f scripts/macro_market_environment_a416.py ]; then
            python scripts/macro_market_environment_a416.py
          else
            echo "macro_market_environment_a416.py not found. Skipping macro."
          fi

      - name: Run robust real data engine A423
        run: |
          if [ -f scripts/robust_real_data_engine_a423.py ]; then
            python scripts/robust_real_data_engine_a423.py
          elif [ -f scripts/robust_real_data_engine_a419.py ]; then
            echo "A423 engine missing, using A419 engine as fallback"
            python scripts/robust_real_data_engine_a419.py
          else
            echo "No robust real data engine script found"
            python - <<'PY'
            import json, pathlib, datetime
            pathlib.Path("data").mkdir(exist_ok=True)
            pathlib.Path("data/market_scanner_summary.json").write_text(json.dumps({
              "version":"A423",
              "generatedAt":datetime.datetime.now().isoformat(timespec="seconds"),
              "status":"engine_script_missing",
              "universeSource":"none",
              "universeCount":0,
              "includedCount":0,
              "priceConnected":0,
              "newsConnected":0,
              "reportConnected":0,
              "chartConnected":0,
              "supplyConnected":0,
              "supplyPartial":0,
              "macroApplied":0,
              "naverMissing":0,
              "averageDataConnectionScore":0
            }, ensure_ascii=False, indent=2), encoding="utf-8")
            PY
          fi

      - name: Write pipeline status A423
        run: python scripts/full_data_pipeline_status_a423.py

      - name: Commit pipeline outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/realtime_recommendations_a405.json data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/data_pipeline_status_a423.json data/data_connection_status_a423.json data/robust_real_data_debug_a423.json data/market_macro_environment.json data/market_macro_environment_summary_a416.json || true
          git commit -m "Full data pipeline A423 fix" || echo "No changes"
          git push
