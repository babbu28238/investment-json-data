name: Update Supply Net Purchase A231

on:
  workflow_dispatch:
  schedule:
    # KST 19:50, after Korean market close
    - cron: '50 10 * * 1-5'

permissions:
  contents: write

jobs:
  update-supply-net-purchase-a231:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx requests beautifulsoup4 lxml

      - name: Build supply net purchase engine
        run: |
          python scripts/build_supply_net_purchase_a231.py

      - name: Commit supply net purchase JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/supply_net_purchase_detail_a231.json data/full_pipeline_summary_a231.json
          git commit -m "Build supply net purchase A231" || echo "No changes"
          git push
