name: Collect Naver Stock News A238

on:
  workflow_dispatch:
  schedule:
    - cron: '25 12 * * 1-5'

permissions:
  contents: write

jobs:
  collect-naver-stock-news-a238:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml beautifulsoup4 html5lib
      - name: Collect Naver stock news
        run: |
          python scripts/collect_naver_stock_news_a238.py
      - name: Commit stock news JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/naver_stock_news_detail_a238.json data/news_data.json data/news_merge_summary_a238.json
          git commit -m "Collect Naver stock news A238" || echo "No changes"
          git push
