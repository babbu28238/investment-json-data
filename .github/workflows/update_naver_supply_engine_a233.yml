name: Update Naver Supply Engine A233

on:
  workflow_dispatch:
  schedule:
    - cron: '20 11 * * 1-5'

permissions:
  contents: write

jobs:
  update-naver-supply-engine-a233:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml beautifulsoup4
      - name: Build Naver supply engine
        run: |
          python scripts/build_naver_supply_engine_a233.py
      - name: Commit Naver supply JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/naver_supply_detail_a233.json data/full_pipeline_summary_a233.json
          git commit -m "Build Naver supply engine A233" || echo "No changes"
          git push
