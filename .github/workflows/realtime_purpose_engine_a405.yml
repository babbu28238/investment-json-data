name: Realtime Purpose Engine A405

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 0-8 * * 1-5'

permissions:
  contents: write

jobs:
  realtime-purpose-engine-a405:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas numpy
      - name: Collect realtime price news report chart
        run: python scripts/realtime_purpose_engine_a405.py
      - name: Commit realtime recommendations
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/realtime_recommendations_a405.json data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/realtime_purpose_summary_a405.json
          git commit -m "Realtime purpose engine A405" || echo "No changes"
          git push
