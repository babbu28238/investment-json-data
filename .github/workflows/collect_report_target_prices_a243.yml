name: Collect Report Target Prices A243

on:
  workflow_dispatch:
  schedule:
    - cron: '35 13 * * 1-5'

permissions:
  contents: write

jobs:
  collect-report-target-prices-a243:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Collect report target prices
        run: python scripts/collect_report_target_prices_a243.py
      - name: Commit report target prices
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/report_target_prices_a243.json data/target_price_bands_a243.json
          git commit -m "Collect report target prices A243" || echo "No changes"
          git push
