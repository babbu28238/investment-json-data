name: Update Supply Exhaustive A232

on:
  workflow_dispatch:
  schedule:
    - cron: '05 11 * * 1-5'

permissions:
  contents: write

jobs:
  update-supply-exhaustive-a232:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx requests beautifulsoup4 lxml
      - name: Build supply exhaustive engine
        run: |
          python scripts/build_supply_exhaustive_a232.py
      - name: Commit supply exhaustive JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/supply_exhaustive_detail_a232.json data/supply_api_diagnostics_a232.json
          git commit -m "Build supply exhaustive engine A232" || echo "No changes"
          git push
