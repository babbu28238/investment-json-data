name: Validate Live Quotes V253 Lock

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-live-quotes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate live quote files
        run: python scripts/validate_live_quotes.py

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-quotes-validation-report
          path: live_quotes_validation_report.txt
