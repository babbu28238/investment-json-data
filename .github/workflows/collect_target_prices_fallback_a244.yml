name: Collect Target Prices Fallback A244

on:
  workflow_dispatch:
  schedule:
    - cron: '50 13 * * 1-5'

permissions:
  contents: write

jobs:
  collect-target-prices-fallback-a244:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Collect target prices with fallback candidates
        run: python scripts/collect_target_prices_fallback_a244.py
      - name: Commit target prices
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/report_target_prices_a244.json data/target_price_bands_a244.json
          git commit -m "Collect target prices fallback A244" || echo "No changes"
          git push
