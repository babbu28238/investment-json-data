name: Real Data All Connector A418

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'

permissions:
  contents: write

jobs:
  real-data-all-connector-a418:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy pykrx
      - name: Build all real-data universe
        run: python scripts/real_data_all_connector_a418.py
      - name: Commit real data all connector
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/realtime_recommendations_a405.json data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/data_connection_status_a418.json data/real_data_all_connector_debug_a418.json
          git commit -m "Real data all connector A418" || echo "No changes"
          git push
