name: Supply Data Diagnosis A412

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 0-8 * * 1-5'

permissions:
  contents: write

jobs:
  supply-data-diagnosis-a412:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Diagnose supply data
        run: python scripts/supply_data_diagnosis_a412.py
      - name: Commit supply diagnosis
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/realtime_recommendations_a405.json data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/supply_data_diagnosis_a412.json
          git commit -m "Supply data diagnosis A412" || echo "No changes"
          git push
