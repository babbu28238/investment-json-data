name: Data Completeness Macro A410

on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 0-8 * * 1-5'

permissions:
  contents: write

jobs:
  data-completeness-macro-a410:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fill missing news report macro fields
        run: python scripts/data_completeness_macro_a410.py
      - name: Commit A410 completed data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/realtime_recommendations_a405.json data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/data_completeness_macro_a410.json
          git commit -m "Data completeness macro A410" || echo "No changes"
          git push
