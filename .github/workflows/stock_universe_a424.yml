name: Stock Universe A424

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1-5'

permissions:
  contents: write

jobs:
  stock-universe-a424:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas pykrx
      - name: Build stock universe
        run: python scripts/stock_universe_a424.py
      - name: Commit stock universe
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_universe_a424.json
          git commit -m "Stock universe A424" || echo "No changes"
          git push
