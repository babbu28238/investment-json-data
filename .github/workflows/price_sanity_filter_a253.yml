name: Price Sanity Filter A253

on:
  workflow_dispatch:
  schedule:
    - cron: '05 16 * * 1-5'

permissions:
  contents: write

jobs:
  price-sanity-filter-a253:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run price sanity filter
        run: python scripts/price_sanity_filter_a253.py
      - name: Commit price sanity result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/price_sanity_a253.json
          git commit -m "Run price sanity filter A253" || echo "No changes"
          git push
