name: News Report Collector Fix A407

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 0-8 * * 1-5'

permissions:
  contents: write

jobs:
  news-report-collector-fix-a407:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas numpy lxml
      - name: Collect price news report chart with fallback collectors
        run: python scripts/news_report_collector_fix_a407.py
      - name: Commit A407 data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/realtime_recommendations_a405.json data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/news_report_collector_debug_a407.json data/realtime_score_reason_summary_a406.json
          git commit -m "News report collector fix A407" || echo "No changes"
          git push
