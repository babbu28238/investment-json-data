name: Invalid Stop Cleanup A254

on:
  workflow_dispatch:
  schedule:
    - cron: '20 16 * * 1-5'

permissions:
  contents: write

jobs:
  invalid-stop-cleanup-a254:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cleanup invalid stop data
        run: python scripts/invalid_stop_cleanup_a254.py
      - name: Commit invalid stop cleanup
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/invalid_stop_cleanup_a254.json
          git commit -m "Cleanup invalid stop data A254" || echo "No changes"
          git push
