name: Update Supply Engine A228

on:
  workflow_dispatch:
  schedule:
    # KST 19:05, after Korean market close
    - cron: '05 10 * * 1-5'

permissions:
  contents: write

jobs:
  update-supply-engine-a228:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx

      - name: Build supply score
        run: |
          python scripts/build_supply_engine_a228.py

      - name: Commit supply score JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stock_candidates_ai_scored.json data/market_scanner_summary.json data/supply_engine_detail_a228.json
          git commit -m "Build supply engine A228" || echo "No changes"
          git push
